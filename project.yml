name: IncidentReporter
options:
  bundleIdPrefix: com.jacob
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  IncidentReporter:
    type: application
    platform: macOS
    sources:
      - IncidentReporter
    dependencies:
      - package: Sparkle
    info:
      path: IncidentReporter/Info.plist
      properties:
        LSApplicationCategoryType: "public.app-category.productivity"
        NSAppleEventsUsageDescription: "IncidentReporter needs access to Mail.app to browse and import emails."
        SUFeedURL: "https://raw.githubusercontent.com/jacobwjl/IncidentReporter/main/appcast.xml"
        SUPublicEDKey: "8FqpDLY71qsdRL5QSh71eYH3hdbqwO3UzyyoSTewhRg="
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacob.IncidentReporter
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: IncidentReporter/Info.plist
        CODE_SIGN_ENTITLEMENTS: IncidentReporter/IncidentReporter.entitlements
        ENABLE_APP_SANDBOX: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
        release:
          CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: IncidentReporter/IncidentReporter.entitlements
      properties:
        com.apple.security.automation.apple-events: true
