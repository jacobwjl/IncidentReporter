name: LegalReporter
options:
  bundleIdPrefix: com.jacob
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  LegalReporter:
    type: application
    platform: macOS
    sources:
      - LegalReporter
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacob.LegalReporter
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "LegalReporter needs access to Mail.app to browse and import emails as exhibits."
        CODE_SIGN_ENTITLEMENTS: LegalReporter/LegalReporter.entitlements
        ENABLE_APP_SANDBOX: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_SUFeedURL: "https://yourserver.com/appcast.xml"
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
        release:
          CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: LegalReporter/LegalReporter.entitlements
      properties:
        com.apple.security.automation.apple-events: true
